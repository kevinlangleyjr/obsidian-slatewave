name: Release

on:
  push:
    tags:
      - "*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify manifest version matches tag
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          manifest_version=$(jq -r .version manifest.json)
          if [ "$tag" != "$manifest_version" ]; then
            echo "Tag '$tag' does not match manifest.json version '$manifest_version'" >&2
            exit 1
          fi

      - name: Create or update release with theme assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" manifest.json theme.css --clobber
          else
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              manifest.json theme.css
          fi
